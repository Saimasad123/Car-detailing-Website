<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services - Luxe Shine</title>
  <link rel="stylesheet" href="css/booking.css">
</head>
<body>
  <h2>Select a Service</h2>
  <div class="services">
    <button class="service-btn" data-service="Exterior Wash">Exterior Wash</button>
    <button class="service-btn" data-service="Interior Cleaning">Interior Cleaning</button>
    <button class="service-btn" data-service="Full Detailing">Full Detailing</button>
  </div>

  <script>
    // Protect route
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = 'login.html';

    const buttons = document.querySelectorAll('.service-btn');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const service = btn.getAttribute('data-service');
        localStorage.setItem('selectedService', service);
        window.location.href = 'booking.html';
      });
    });
  </script>
</body>
</html>
