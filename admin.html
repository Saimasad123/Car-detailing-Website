<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Luxe Shine</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <img src="lux.png" class="logo-img" alt="Luxe">
      <span>Luxe Shine</span>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="booking.html">Book Now</a>
      <a href="history.html">History</a>
      <a href="admin.html" class="active">Admin</a>
      <a href="javascript:void(0);" onclick="logout(); return false;">Logout</a>
    </div>
  </nav>

  <div class="header">
    <h1>Admin Panel</h1>
    <p>Manage services and bookings</p>
  </div>

  <div style="max-width:1100px;margin:30px auto;display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:0 20px;">
    <div class="booking" style="padding:20px;">
      <h3>Add Service</h3>
      <form id="serviceForm">
        <input id="serviceName" type="text" placeholder="Service Name" required>
        <input id="servicePrice" type="number" placeholder="Price (USD)" required>
        <button type="submit" class="btn-primary">Add Service</button>
      </form>

      <h3 style="margin-top:18px;">Services</h3>
      <div id="servicesList"></div>
    </div>

    <div class="booking" style="padding:20px;">
      <h3>Bookings</h3>
      <div id="bookingsTable"></div>
    </div>
  </div>

  <!-- AI Chatbot Floating Button -->
  <div class="ai-chat-btn" id="aiChatBtn">
    <span>💬</span>
  </div>

  <!-- AI Chatbot Window -->
  <div class="ai-chat-window" id="aiChatWindow">
    <div class="ai-chat-header">🤖 Luxe Shine Assistant</div>
    <div class="ai-chat-body" id="aiChatBody"></div>
    <div class="ai-chat-input">
      <input type="text" id="aiChatInput" placeholder="Ask me anything..." />
      <button onclick="sendAIMessage()">Send</button>
    </div>
  </div>

  <script>
    function logout(){ localStorage.removeItem('user'); window.location.href='login.html'; }
  </script>
  <script src="js/admin.js"></script>
  <script src="js/chatbot.js"></script>
</body>
</html>
